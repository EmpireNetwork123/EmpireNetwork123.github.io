about_me: |
I am a cybersecurity researcher and PhD applicant passionate about building intelligent systems that bridge security with human-centered design. My work spans **AI/ML Applications**, **Human-Computer Interaction**, **Data Mining**, and **Cybersecurity**, exploring how these domains intersect to create adaptive solutions. My master's thesis pioneered a **decentralized, data-driven framework** for ransomware detection, achieving 99.9% accuracy through **behavioral analysis** and **adaptive learning**. I'm now expanding my focus to **explainable AI** in security systems, **interactive data visualization** for threat intelligence, and **human-centered approaches** to vulnerability discovery. My goal is to develop **robust, interpretable systems** that protect critical infrastructure while empowering users through **intuitive interfaces** and **accessible security tools**.
